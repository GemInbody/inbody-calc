<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HB4XH3CRL1"></script>

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'G-HB4XH3CRL1');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="T_yxR51GQZZc2WpKEXRiEYRPwu7FbgVh71ld0i9NAcM" />
    
    <title>منصة كمال الأجسام وتحليل الجسم الرقمي | حاسبة InBody</title>
    <meta name="description" content="احسب نسبة الدهون، العضلات، الماء، الأملاح، والبروتين في جسمك بدقة. المنصة الرقمية الشاملة للاعبي كمال الأجسام وحساب السعرات الحرارية والماكروز اليومية.">
    <meta name="keywords" content="إنبودي, حساب الدهون, كمال أجسام, حاسبة السعرات, InBody مجاني, حساب البروتين, نسبة العضلات, تحليل الجسم">
    
    <style>
        :root {
            --primary: #2ed573;
            --dark: #1e2229;
            --card-bg: #2f3542;
            --text: #ffffff;
            --text-muted: #a4b0be;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--dark); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); }
        input, select { width: 100%; padding: 12px; border: 2px solid #57606f; border-radius: 8px; background: #1e2229; color: #fff; font-size: 16px; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); outline: none; }
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-calc { background: var(--primary); color: var(--dark); }
        .btn-calc:hover { background: #26af5f; transform: translateY(-2px); }
        .btn-reset { background: #747d8c; color: #fff; }
        .btn-reset:hover { background: #57606f; }
        .result-box { margin-top: 30px; padding: 20px; background: #1e2229; border-radius: 10px; display: none; border-right: 5px solid var(--primary); }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #57606f; }
        .result-item:last-child { border-bottom: none; }
        .result-val { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>منصة كمال الأجسام وتحليل الجسم</h1>
    
    <div class="form-group">
        <label>الجنس</label>
        <select id="gender">
            <option value="male">ذكر</option>
            <option value="female">أنثى</option>
        </select>
    </div>
    <div class="form-group">
        <label>الوزن (كجم)</label>
        <input type="number" id="weight" placeholder="مثال: 75">
    </div>
    <div class="form-group">
        <label>الطول (سم)</label>
        <input type="number" id="height" placeholder="مثال: 175">
    </div>
    <div class="form-group">
        <label>العمر (بالسنوات)</label>
        <input type="number" id="age" placeholder="مثال: 22">
    </div>
    <div class="form-group">
        <label>محيط الرقبة (سم)</label>
        <input type="number" id="neck" placeholder="اختياري لزيادة دقة الدهون">
    </div>
    <div class="form-group">
        <label>محيط الخصر (سم)</label>
        <input type="number" id="waist" placeholder="اختياري لزيادة دقة الدهون">
    </div>

    <div class="btn-group">
        <button class="btn-calc" onclick="calculateInBody()">احسب التحليل الرقمي</button>
        <button class="btn-reset" onclick="resetForm()">مسح البيانات</button>
    </div>

    <div class="result-box" id="resultBox">
        <div class="result-item"><span>مؤشر كتلة الجسم (BMI):</span> <span class="result-val" id="bmiVal">0</span></div>
        <div class="result-item"><span>نسبة الدهون التقريبية:</span> <span class="result-val" id="fatVal">0</span></div>
        <div class="result-item"><span>كتلة العضلات الصافية:</span> <span class="result-val" id="muscleVal">0 كجم</span></div>
        <div class="result-item"><span>مستوى ماء الجسم:</span> <span class="result-val" id="waterVal">0 لتر</span></div>
        <div class="result-item"><span>نسبة البروتين في الجسم:</span> <span class="result-val" id="proteinVal">0 كجم</span></div>
        <div class="result-item"><span>محتوى الأملاح والمعادن:</span> <span class="result-val" id="mineralsVal">0 كجم</span></div>
        <div class="result-item"><span>السعرات الحرارية لثبات الوزن (BMR):</span> <span class="result-val" id="bmrVal">0 كالوري</span></div>
    </div>
</div>

<script>
function calculateInBody() {
    let weight = parseFloat(document.getElementById('weight').value);
    let height = parseFloat(document.getElementById('height').value);
    let age = parseFloat(document.getElementById('age').value);
    let gender = document.getElementById('gender').value;

    if(!weight || !height || !age) {
        alert("برجاء إدخال الوزن والطول والعمر بشكل صحيح.");
        return;
    }

    // حساب BMI
    let heightM = height / 100;
    let bmi = weight / (heightM * heightM);
    
    // حساب نسبة الدهون
    let fatPercent = (gender === 'male') ? (1.20 * bmi) + (0.23 * age) - 16.2 : (1.20 * bmi) + (0.23 * age) - 5.4;
    if(fatPercent < 3) fatPercent = 4;

    let fatWeight = weight * (fatPercent / 100);
    let lbm = weight - fatWeight; 
    
    // حساب المكونات الحيوية
    let muscle = lbm * 0.72;
    let water = weight * (gender === 'male' ? 0.60 : 0.50);
    let protein = lbm * 0.19;
    let minerals = lbm * 0.06;
    
    // حساب السعرات BMR
    let bmr = (gender === 'male') ? (10 * weight) + (6.25 * height) - (5 * age) + 5 : (10 * weight) + (6.25 * height) - (5 * age) - 161;

    // عرض النتائج
    document.getElementById('bmiVal').innerText = bmi.toFixed(1);
    document.getElementById('fatVal').innerText = fatPercent.toFixed(1) + " %";
    document.getElementById('muscleVal').innerText = muscle.toFixed(1) + " كجم";
    document.getElementById('waterVal').innerText = water.toFixed(1) + " لتر";
    document.getElementById('proteinVal').innerText = protein.toFixed(1) + " كجم";
    document.getElementById('mineralsVal').innerText = minerals.toFixed(1) + " كجم";
    document.getElementById('bmrVal').innerText = Math.round(bmr) + " كالوري";

    document.getElementById('resultBox').style.display = "block";
}

function resetForm() {
    document.getElementById('weight').value = '';
    document.getElementById('height').value = '';
    document.getElementById('age').value = '';
    document.getElementById('neck').value = '';
    document.getElementById('waist').value = '';
    document.getElementById('resultBox').style.display = "none";
}
</script>
</body>
</html>
